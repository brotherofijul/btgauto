<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BOIAuto</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
      @theme {
        --font-display: "Space Grotesk", sans-serif;
        --font-mono: "JetBrains Mono", monospace;
        --color-base-950: #0a0e0d;
        --color-base-900: #111916;
        --color-base-800: #1a2420;
        --color-base-700: #243430;
        --color-base-600: #2e443d;
        --color-base-400: #5a7a6e;
        --color-base-200: #a3c4b5;
        --color-base-100: #d0e8dc;
        --color-s1: #00e88f;
        --color-s1-dim: #00c278;
        --color-s2: #00c8ff;
        --color-s2-dim: #00a8d6;
        --color-warn: #f5a623;
        --color-danger: #ff4d6a;
      }
    </style>
    <link rel="stylesheet" href="style.css" />
    <script defer src="script.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="min-h-screen text-base-100 bg-grid bg-glow overflow-x-hidden">
    <div
      id="particles"
      class="fixed inset-0 pointer-events-none z-0"
      aria-hidden="true"
    ></div>

    <div
      x-data="boiauto()"
      x-init="init()"
      class="relative z-10 min-h-screen flex flex-col"
    >
      <!-- ═══ HEADER ═══ -->
      <header
        class="border-b border-base-800/50 backdrop-blur-sm bg-base-950/70 sticky top-0 z-30"
      >
        <div
          class="max-w-6xl mx-auto px-4 sm:px-6 py-3 flex items-center justify-between gap-3"
        >
          <div class="flex items-center gap-2.5 flex-shrink-0">
            <div
              class="w-9 h-9 rounded-lg bg-s1/10 border border-s1/20 flex items-center justify-center"
            >
              <svg
                class="w-4 h-4 text-s1"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M12 2L2 7l10 5 10-5-10-5z" />
                <path d="M2 17l10 5 10-5" />
                <path d="M2 12l10 5 10-5" />
              </svg>
            </div>
            <div>
              <h1
                class="text-base font-bold tracking-tight text-shimmer leading-tight"
              >
                BOIAuto
              </h1>
              <p
                class="text-[10px] text-base-400 font-mono tracking-wider uppercase leading-tight"
              >
                Dual Slot
              </p>
            </div>
          </div>
          <div class="flex items-center gap-2 sm:gap-3">
            <template x-for="n in [1,2]" :key="'hb-'+n">
              <div
                class="flex items-center gap-1.5 px-2.5 py-1 rounded-full border text-[11px] font-mono"
                :class="slots[n].running
                   ? (n===1?'border-s1/30 bg-s1/10 text-s1':'border-s2/30 bg-s2/10 text-s2')
                   : 'border-base-700/40 bg-base-800/40 text-base-500'"
              >
                <span class="relative flex items-center justify-center">
                  <span
                    x-show="slots[n].running"
                    class="absolute w-2 h-2 rounded-full"
                    :class="n===1?'bg-s1':'bg-s2'"
                    style="
                      animation: pulse-ring 1.4s
                        cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
                    "
                  ></span>
                  <span
                    class="w-1.5 h-1.5 rounded-full"
                    :class="slots[n].running?(n===1?'bg-s1':'bg-s2'):'bg-base-600'"
                  ></span>
                </span>
                <span x-text="'S'+n"></span>
              </div>
            </template>
            <div
              class="hidden sm:flex items-center gap-1.5 text-[11px] font-mono"
              :class="wsOk?'text-base-400':'text-danger'"
            >
              <span
                class="w-1.5 h-1.5 rounded-full"
                :class="wsOk?'bg-base-400':'bg-danger animate-pulse'"
              ></span>
              <span x-text="wsOk?'WS':'RECONN'"></span>
            </div>
          </div>
        </div>
      </header>

      <!-- ═══ MODE BAR ═══ -->
      <div class="border-b border-base-800/35 bg-base-900/35 backdrop-blur-sm">
        <div
          class="max-w-6xl mx-auto px-4 sm:px-6 py-2 flex items-center gap-3"
        >
          <span
            class="text-[11px] text-base-500 uppercase tracking-widest font-semibold flex-shrink-0"
            >Mode</span
          >
          <div
            class="flex rounded-lg border border-base-700/40 overflow-hidden"
          >
            <button
              @click="mode='diplomacia'"
              type="button"
              class="px-3.5 py-1.5 text-xs font-semibold transition-colors flex items-center gap-1.5"
              :class="mode==='diplomacia'?'bg-s1/10 text-s1':'text-base-500 hover:text-base-300'"
            >
              <svg
                class="w-3.5 h-3.5"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                <polyline points="9 22 9 12 15 12 15 22" />
              </svg>
              Diplomacia
            </button>
            <button
              disabled
              type="button"
              class="px-3.5 py-1.5 text-xs font-medium text-base-600 border-l border-base-700/40 cursor-not-allowed flex items-center gap-1.5"
            >
              <svg
                class="w-3.5 h-3.5"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <circle cx="12" cy="12" r="10" />
                <line x1="2" y1="12" x2="22" y2="12" />
                <path
                  d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"
                />
              </svg>
              Rival Regions
              <span
                class="text-[9px] bg-base-700/80 text-base-400 px-1.5 py-px rounded-full font-mono leading-none"
                >Soon</span
              >
            </button>
          </div>
        </div>
      </div>

      <!-- ═══ MAIN ═══ -->
      <main class="flex-1 max-w-6xl mx-auto w-full px-4 sm:px-6 py-5 sm:py-7">
        <div class="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-12 gap-5">
          <!-- ── SLOT CARD (dirender per slot) ── -->
          <template x-for="n in [1,2]" :key="'slot-'+n">
            <section class="xl:col-span-3 xl:flex xl:flex-col">
              <div
                class="rounded-2xl border overflow-hidden transition-all duration-500 xl:flex-1 xl:flex xl:flex-col"
                :class="slots[n].running
                   ? (n===1?'border-s1/30 glow-s1 bg-base-900/80':'border-s2/30 glow-s2 bg-base-900/80')
                   : 'border-base-800/50 bg-base-900/45'"
              >
                <!-- Accent bar -->
                <div
                  class="h-1 flex-shrink-0"
                  :class="slots[n].running?(n===1?'bg-s1/60':'bg-s2/60'):'bg-base-700/40'"
                ></div>

                <div class="p-4 sm:p-5 space-y-3 xl:flex-1 xl:flex xl:flex-col">
                  <!-- Header -->
                  <div class="flex items-center justify-between flex-shrink-0">
                    <span
                      class="text-xs font-mono font-bold px-2 py-0.5 rounded"
                      :class="n===1?'text-s1 bg-s1/10':'text-s2 bg-s2/10'"
                      x-text="'SLOT '+n"
                    ></span>
                    <span
                      class="text-[11px] font-mono"
                      :class="slots[n].running?(n===1?'text-s1':'text-s2'):'text-base-600'"
                      x-text="slots[n].running?'AKTIF':'IDLE'"
                    ></span>
                  </div>

                  <!-- Token -->
                  <div class="flex-shrink-0">
                    <label class="block text-[11px] text-base-400 mb-1"
                      >Authorization Token</label
                    >
                    <div class="relative">
                      <input
                        x-model="slots[n].token"
                        @input="saveToken(n)"
                        :type="slots[n].showTk?'text':'password'"
                        :disabled="slots[n].running"
                        placeholder="Bearer token..."
                        :class="n===2?'s2f':''"
                        class="w-full rounded-lg bg-base-800 border border-base-700 text-sm px-3 py-2 pr-9 font-mono placeholder:text-base-600 transition-colors"
                      />
                      <button
                        @click="slots[n].showTk=!slots[n].showTk"
                        type="button"
                        class="absolute right-2 top-1/2 -translate-y-1/2 text-base-500 hover:text-base-200 transition-colors p-0.5"
                      >
                        <svg
                          x-show="!slots[n].showTk"
                          class="w-4 h-4"
                          viewBox="0 0 24 24"
                          fill="none"
                          stroke="currentColor"
                          stroke-width="2"
                          stroke-linecap="round"
                          stroke-linejoin="round"
                        >
                          <path
                            d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"
                          />
                          <circle cx="12" cy="12" r="3" />
                        </svg>
                        <svg
                          x-show="slots[n].showTk"
                          x-cloak
                          class="w-4 h-4"
                          viewBox="0 0 24 24"
                          fill="none"
                          stroke="currentColor"
                          stroke-width="2"
                          stroke-linecap="round"
                          stroke-linejoin="round"
                        >
                          <path
                            d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"
                          />
                          <path
                            d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"
                          />
                          <line x1="1" y1="1" x2="23" y2="23" />
                        </svg>
                      </button>
                    </div>
                  </div>

                  <!-- Skill -->
                  <div class="flex-shrink-0">
                    <label class="block text-[11px] text-base-400 mb-1"
                      >Skill</label
                    >
                    <div class="grid grid-cols-3 gap-1.5">
                      <template x-for="s in skills" :key="n+'sk-'+s.value">
                        <button
                          @click="slots[n].skill=s.value"
                          :disabled="slots[n].running"
                          type="button"
                          class="rounded-lg text-[11px] font-medium py-2 border transition-all text-center leading-tight"
                          :class="slots[n].skill===s.value
                                ? (n===1?'border-s1/50 bg-s1/10 text-s1':'border-s2/50 bg-s2/10 text-s2')
                                : 'border-base-700 bg-base-800 text-base-500 hover:text-base-300'"
                        >
                          <span x-text="s.label"></span>
                        </button>
                      </template>
                    </div>
                  </div>

                  <!-- Pay -->
                  <div class="flex-shrink-0">
                    <label class="block text-[11px] text-base-400 mb-1"
                      >Bayar</label
                    >
                    <div class="grid grid-cols-2 gap-1.5">
                      <button
                        @click="slots[n].pay='1'"
                        :disabled="slots[n].running"
                        type="button"
                        class="rounded-lg text-[11px] font-medium py-2 border transition-all flex items-center justify-center gap-1.5"
                        :class="slots[n].pay==='1'
                              ? (n===1?'border-s1/50 bg-s1/10 text-s1':'border-s2/50 bg-s2/10 text-s2')
                              : 'border-base-700 bg-base-800 text-base-500 hover:text-base-300'"
                      >
                        <svg
                          class="w-3.5 h-3.5"
                          viewBox="0 0 24 24"
                          fill="none"
                          stroke="currentColor"
                          stroke-width="2"
                          stroke-linecap="round"
                          stroke-linejoin="round"
                        >
                          <circle cx="12" cy="12" r="10" />
                          <path
                            d="M15 9.5a3 3 0 0 0-3-2.5H10a2.5 2.5 0 0 0 0 5h4a2.5 2.5 0 0 1 0 5h-2a3 3 0 0 1-3-2.5"
                          />
                        </svg>
                        Uang
                      </button>
                      <button
                        @click="slots[n].pay='2'"
                        :disabled="slots[n].running"
                        type="button"
                        class="rounded-lg text-[11px] font-medium py-2 border transition-all flex items-center justify-center gap-1.5"
                        :class="slots[n].pay==='2'
                              ? (n===1?'border-s1/50 bg-s1/10 text-s1':'border-s2/50 bg-s2/10 text-s2')
                              : 'border-base-700 bg-base-800 text-base-500 hover:text-base-300'"
                      >
                        <svg
                          class="w-3.5 h-3.5"
                          viewBox="0 0 24 24"
                          fill="none"
                          stroke="currentColor"
                          stroke-width="2"
                          stroke-linecap="round"
                          stroke-linejoin="round"
                        >
                          <path d="M6 3h12l4 6-10 13L2 9z" />
                          <path d="M2 9h20" />
                          <path d="M10 3l-4 6 6 13" />
                          <path d="M14 3l4 6-6 13" />
                        </svg>
                        Diamond
                      </button>
                    </div>
                  </div>

                  <!-- Tombol Aksi -->
                  <div class="flex gap-2 flex-shrink-0">
                    <button
                      @click="startSlot(n)"
                      :disabled="slots[n].running||!slots[n].token.trim()"
                      type="button"
                      class="flex-1 rounded-lg font-semibold text-xs py-2.5 flex items-center justify-center gap-1.5 transition-all"
                      :class="slots[n].running||!slots[n].token.trim()
                            ? 'bg-base-700 text-base-500'
                            : (n===1?'bg-s1 text-base-950 hover:bg-s1-dim':'bg-s2 text-base-950 hover:bg-s2-dim')+' active:scale-[.97]'"
                    >
                      <svg
                        class="w-3.5 h-3.5"
                        viewBox="0 0 24 24"
                        fill="currentColor"
                      >
                        <polygon points="5,3 19,12 5,21" />
                      </svg>
                      Mulai
                    </button>
                    <button
                      @click="stopSlot(n)"
                      :disabled="!slots[n].running"
                      type="button"
                      class="flex-1 rounded-lg font-semibold text-xs py-2.5 flex items-center justify-center gap-1.5 border transition-all"
                      :class="!slots[n].running
                            ? 'border-base-700 bg-base-800 text-base-600'
                            : 'border-danger/40 bg-danger/10 text-danger hover:bg-danger/15 active:scale-[.97]'"
                    >
                      <svg
                        class="w-3.5 h-3.5"
                        viewBox="0 0 24 24"
                        fill="currentColor"
                      >
                        <rect x="6" y="6" width="12" height="12" rx="1.5" />
                      </svg>
                      Stop
                    </button>
                  </div>

                  <!-- Error inline -->
                  <div
                    x-show="slots[n].error"
                    x-transition.opacity.duration.200ms
                    class="rounded-lg bg-danger/10 border border-danger/20 px-3 py-2 text-[11px] text-danger font-mono leading-snug flex-shrink-0"
                    x-text="slots[n].error"
                  ></div>

                  <!-- Stats -->
                  <div class="xl:mt-auto flex-shrink-0 pt-1 space-y-2">
                    <!-- Current + Next -->
                    <div class="grid grid-cols-2 gap-2">
                      <div
                        class="rounded-lg bg-base-800/50 border border-base-700/30 p-2.5 text-center"
                      >
                        <p
                          class="text-[9px] text-base-500 uppercase tracking-widest mb-1"
                        >
                          Current
                        </p>
                        <p
                          class="text-2xl font-bold font-mono text-base-100"
                          x-text="slots[n].currentLevel??'—'"
                        >
                          —
                        </p>
                      </div>
                      <div
                        class="rounded-lg bg-base-800/50 border border-base-700/30 p-2.5 text-center"
                      >
                        <p
                          class="text-[9px] text-base-500 uppercase tracking-widest mb-1"
                        >
                          Next
                        </p>
                        <p
                          class="text-2xl font-bold font-mono"
                          :class="n===1?'text-s1':'text-s2'"
                          x-text="slots[n].targetLevel??'—'"
                        >
                          —
                        </p>
                      </div>
                    </div>
                    <!-- Time (full width, font lebih kecil) -->
                    <div
                      class="rounded-lg bg-base-800/50 border border-base-700/30 px-3 py-2 text-center"
                    >
                      <p
                        class="text-[9px] text-base-500 uppercase tracking-widest mb-0.5"
                      >
                        Time
                      </p>
                      <p
                        class="text-lg font-bold font-mono leading-none"
                        :class="timeClass(n)"
                        :style="timeLow(n)?'animation:count-pulse 1s ease-in-out infinite':''"
                        x-text="slots[n].time"
                      >
                        —
                      </p>
                    </div>
                  </div>
                </div>
              </div>
            </section>
          </template>

          <!-- ── LOG VIEWER ── -->
          <section class="lg:col-span-2 xl:col-span-6">
            <div
              class="rounded-2xl border border-base-800/50 bg-base-900/45 overflow-hidden flex flex-col h-[420px] lg:h-[380px] xl:h-[calc(100vh-9.5rem)]"
            >
              <!-- Header -->
              <div
                class="px-4 py-2.5 border-b border-base-800/50 flex items-center justify-between bg-base-900/70 backdrop-blur-sm flex-shrink-0 gap-2"
              >
                <div class="flex items-center gap-2 flex-shrink-0">
                  <div class="flex gap-1.5">
                    <span class="w-2.5 h-2.5 rounded-full bg-danger/60"></span>
                    <span class="w-2.5 h-2.5 rounded-full bg-warn/60"></span>
                    <span class="w-2.5 h-2.5 rounded-full bg-s1/60"></span>
                  </div>
                  <span
                    class="text-xs font-semibold text-base-200 uppercase tracking-widest hidden sm:inline"
                    >Log</span
                  >
                </div>
                <div class="flex items-center gap-1.5 flex-wrap justify-end">
                  <!-- Filter slot -->
                  <div
                    class="flex rounded-md border border-base-700/40 overflow-hidden text-[10px] font-mono"
                  >
                    <template
                      x-for="opt in [{v:'all',l:'All'},{v:'1',l:'S1'},{v:'2',l:'S2'}]"
                      :key="'fs-'+opt.v"
                    >
                      <button
                        @click="fSlot=opt.v"
                        type="button"
                        :class="opt.v!=='all'?'border-l border-base-700/40':''"
                        class="px-2 py-0.5 transition-colors"
                        :class="fSlot===opt.v
                              ? (opt.v==='1'?'bg-s1/15 text-s1':opt.v==='2'?'bg-s2/15 text-s2':'bg-base-700/60 text-base-100')
                              : 'text-base-500 hover:text-base-300'"
                        x-text="opt.l"
                      ></button>
                    </template>
                  </div>
                  <!-- Filter tipe -->
                  <div
                    class="flex rounded-md border border-base-700/40 overflow-hidden text-[10px] font-mono"
                  >
                    <template
                      x-for="opt in [{v:'all',l:'All'},{v:'success',l:'OK'},{v:'error',l:'Err'}]"
                      :key="'ft-'+opt.v"
                    >
                      <button
                        @click="fType=opt.v"
                        type="button"
                        :class="opt.v!=='all'?'border-l border-base-700/40':''"
                        class="px-2 py-0.5 transition-colors"
                        :class="fType===opt.v
                              ? (opt.v==='error'?'bg-danger/15 text-danger':'bg-s1/15 text-s1')
                              : 'text-base-500 hover:text-base-300'"
                        x-text="opt.l"
                      ></button>
                    </template>
                  </div>
                  <!-- Clear -->
                  <button
                    @click="clearLogs()"
                    type="button"
                    title="Bersihkan log saja"
                    class="text-base-500 hover:text-base-200 transition-colors p-0.5 rounded"
                  >
                    <svg
                      class="w-3.5 h-3.5"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    >
                      <polyline points="3 6 5 6 21 6" />
                      <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
                      <path d="M10 11v6" />
                      <path d="M14 11v6" />
                      <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2" />
                    </svg>
                  </button>
                </div>
              </div>

              <!-- Body -->
              <div
                class="flex-1 overflow-y-auto log-scroll px-3 py-2 space-y-0.5 font-mono text-[12px] leading-relaxed"
                x-ref="logBox"
              >
                <template x-for="log in filteredLogs" :key="log._id">
                  <div
                    class="flex items-start gap-2 py-0.5 px-1.5 rounded hover:bg-base-800/30 transition-colors"
                    x-transition:enter="transition ease-out duration-150"
                    x-transition:enter-start="opacity-0 -translate-y-0.5"
                    x-transition:enter-end="opacity-100 translate-y-0"
                  >
                    <span
                      class="text-base-600 flex-shrink-0 text-[10px] pt-px select-none w-[58px]"
                      x-text="log.time"
                    ></span>
                    <span
                      class="flex-shrink-0 text-[9px] font-bold px-1 py-px rounded mt-px"
                      :class="log.slot===1?'bg-s1/15 text-s1':'bg-s2/15 text-s2'"
                      x-text="'S'+log.slot"
                    ></span>
                    <span
                      class="flex-shrink-0 mt-px"
                      x-html="logIcon(log.logType)"
                    ></span>
                    <span
                      class="break-all"
                      :class="logColor(log)"
                      x-text="log.text"
                    ></span>
                  </div>
                </template>
                <div
                  x-show="logs.length===0"
                  class="flex flex-col items-center justify-center h-full text-base-600 select-none"
                >
                  <svg
                    class="w-10 h-10 mb-2.5 opacity-20"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.5"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <path
                      d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"
                    />
                    <polyline points="14 2 14 8 20 8" />
                    <line x1="16" y1="13" x2="8" y2="13" />
                    <line x1="16" y1="17" x2="8" y2="17" />
                  </svg>
                  <p class="text-xs">Belum ada aktivitas</p>
                </div>
              </div>

              <!-- Footer -->
              <div
                class="px-4 py-1.5 border-t border-base-800/50 bg-base-900/70 flex items-center justify-between text-[10px] font-mono text-base-600 flex-shrink-0"
              >
                <span x-text="filteredLogs.length+' entri'"></span>
                <span
                  x-show="slots[1].running||slots[2].running"
                  class="flex items-center gap-1.5 text-base-400/50"
                >
                  <span
                    class="w-1 h-1 rounded-full bg-s1 animate-pulse"
                    x-show="slots[1].running"
                  ></span>
                  <span
                    class="w-1 h-1 rounded-full bg-s2 animate-pulse"
                    x-show="slots[2].running"
                  ></span>
                  live
                </span>
              </div>
            </div>
          </section>
        </div>
      </main>

      <!-- ═══ FOOTER ═══ -->
      <footer class="border-t border-base-800/30 py-3 mt-auto">
        <div
          class="max-w-6xl mx-auto px-4 sm:px-6 flex items-center justify-between text-[10px] text-base-600 font-mono"
        >
          <span>BOIAuto v2.3.0</span>
          <span
            x-text="mode==='diplomacia'?'Diplomacia · 2 Slot · WebSocket':'—'"
          ></span>
        </div>
      </footer>
    </div>
  </body>
</html>
